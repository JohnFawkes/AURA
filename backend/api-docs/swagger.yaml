basePath: /
definitions:
  config.Config:
    properties:
      auth:
        allOf:
        - $ref: '#/definitions/config.Config_Auth'
        description: Authentication settings.
      auto_download:
        allOf:
        - $ref: '#/definitions/config.Config_AutoDownload'
        description: Auto-download settings.
      database:
        allOf:
        - $ref: '#/definitions/config.Config_Database'
        description: Database configuration settings.
      images:
        allOf:
        - $ref: '#/definitions/config.Config_Images'
        description: Image settings.
      labels_and_tags:
        allOf:
        - $ref: '#/definitions/config.Config_LabelsAndTags'
        description: Labels and tags settings.
      logging:
        allOf:
        - $ref: '#/definitions/config.Config_Logging'
        description: Logging configuration settings.
      media_server:
        allOf:
        - $ref: '#/definitions/config.Config_MediaServer'
        description: Media server integration settings.
      mediux:
        allOf:
        - $ref: '#/definitions/config.Config_Mediux'
        description: MediUX integration settings.
      notifications:
        allOf:
        - $ref: '#/definitions/config.Config_Notifications'
        description: Notification settings.
      sonarr_radarr:
        allOf:
        - $ref: '#/definitions/config.Config_SonarrRadarr_Apps'
        description: List of Sonarr/Radarr instances to integrate with.
      tmdb:
        allOf:
        - $ref: '#/definitions/config.Config_TMDB'
        description: TMDB (The Movie Database) integration settings.
    type: object
  config.Config_Auth:
    properties:
      enabled:
        description: Whether to enable authentication.
        type: boolean
      password:
        description: Password for authentication.
        type: string
    type: object
  config.Config_AutoDownload:
    properties:
      cron:
        description: Cron expression for scheduling auto-downloads.
        type: string
      enabled:
        description: Whether auto-download is enabled.
        type: boolean
    type: object
  config.Config_CacheImages:
    properties:
      enabled:
        description: Whether to enable caching of images.
        type: boolean
    type: object
  config.Config_Database:
    properties:
      dsn:
        description: Data Source Name for the database connection (if applicable).
        type: string
      host:
        description: Hostname or IP address of the database server (if applicable).
        type: string
      name:
        description: Name of the database to connect to.
        type: string
      password:
        description: Password for database authentication (if applicable).
        type: string
      path:
        description: File path for the database (if applicable, e.g., for SQLite).
        type: string
      port:
        description: Port number of the database server (if applicable).
        type: integer
      type:
        description: Type of database (e.g., "sqlite", "mysql", "postgresql").
        type: string
      user:
        description: Username for database authentication (if applicable).
        type: string
    type: object
  config.Config_Images:
    properties:
      cache_images:
        allOf:
        - $ref: '#/definitions/config.Config_CacheImages'
        description: Settings for caching images.
      save_images_locally:
        allOf:
        - $ref: '#/definitions/config.Config_SaveImagesLocally'
        description: Settings for saving images locally alongside content.
    type: object
  config.Config_LabelsAndTags:
    properties:
      applications:
        items:
          $ref: '#/definitions/config.Config_LabelsAndTagsProvider'
        type: array
    type: object
  config.Config_LabelsAndTagsProvider:
    properties:
      add:
        items:
          type: string
        type: array
      add_label_tag_for_selected_types:
        type: boolean
      application:
        type: string
      enabled:
        type: boolean
      remove:
        items:
          type: string
        type: array
    type: object
  config.Config_Logging:
    properties:
      file:
        description: File path for logging output.
        type: string
      level:
        description: Logging level (e.g., TRACE, DEBUG, INFO, WARN, ERROR).
        type: string
    type: object
  config.Config_MediaServer:
    properties:
      api_token:
        description: Authentication token for accessing the media server.
        type: string
      libraries:
        description: List of media server libraries to manage.
        items:
          $ref: '#/definitions/models.LibrarySection'
        type: array
      type:
        description: Type of media server (e.g., plex, emby, jellyfin).
        type: string
      url:
        description: Base URL of the media server. This is either the IP:Port or the
          domain name (e.g., plex.domain.com).
        type: string
      user_id:
        description: User ID for accessing the media server. This is used for Emby
          and Jellyfin servers.
        type: string
    type: object
  config.Config_Mediux:
    properties:
      api_token:
        description: Authentication token for accessing MediUX services.
        type: string
      download_quality:
        description: 'Quality of the media to download from MediUX (Options: "original",
          "optimized") Defaults to "optimized".'
        type: string
    type: object
  config.Config_Notification_Discord:
    properties:
      webhook:
        description: Webhook URL for the Discord notification provider.
        type: string
    type: object
  config.Config_Notification_Gotify:
    properties:
      api_token:
        description: Token for the Gotify notification provider.
        type: string
      url:
        description: URL for the Gotify notification provider.
        type: string
    type: object
  config.Config_Notification_Provider:
    properties:
      discord:
        allOf:
        - $ref: '#/definitions/config.Config_Notification_Discord'
        description: Discord notification settings
      enabled:
        description: Whether this notification method is enabled
        type: boolean
      gotify:
        allOf:
        - $ref: '#/definitions/config.Config_Notification_Gotify'
        description: Gotify notification settings
      provider:
        description: Notification provider
        type: string
      pushover:
        allOf:
        - $ref: '#/definitions/config.Config_Notification_Pushover'
        description: Pushover notification settings
      webhook:
        allOf:
        - $ref: '#/definitions/config.Config_Notification_Webhook'
        description: Webhook notification settings
    type: object
  config.Config_Notification_Pushover:
    properties:
      api_token:
        description: Token for the Pushover notification provider.
        type: string
      user_key:
        description: UserKey for the Pushover notification provider.
        type: string
    type: object
  config.Config_Notification_Webhook:
    properties:
      headers:
        additionalProperties:
          type: string
        description: Headers for the Webhook notification provider.
        type: object
      url:
        description: URL for the Webhook notification provider.
        type: string
    type: object
  config.Config_Notifications:
    properties:
      enabled:
        description: Whether this notification method is enabled
        type: boolean
      providers:
        description: List of notification providers
        items:
          $ref: '#/definitions/config.Config_Notification_Provider'
        type: array
    type: object
  config.Config_SaveImagesLocally:
    properties:
      enabled:
        description: Whether to save images next to their content.
        type: boolean
      episode_naming_convention:
        description: Episode naming convention for the media server. Only needed for
          Plex. Will default to match
        type: string
      path:
        description: By default, this is set to alongside the content. If set, this
          will override that behavior and save all images to this path.
        type: string
      running_on_windows:
        description: Whether the application is running on Windows. This affects path
          formatting.
        type: boolean
    type: object
  config.Config_SonarrRadarr_Apps:
    properties:
      applications:
        description: List of Sonarr/Radarr applications to integrate with.
        items:
          $ref: '#/definitions/config.Config_SonarrRadarrApp'
        type: array
    type: object
  config.Config_SonarrRadarrApp:
    properties:
      api_token:
        description: API key for accessing the Sonarr/Radarr server.
        type: string
      library:
        description: Name of the Media Server library associated with this Sonarr/Radarr
          instance.
        type: string
      type:
        description: Type of service (either "sonarr" or "radarr").
        type: string
      url:
        description: Base URL of the Sonarr/Radarr server.
        type: string
    type: object
  config.Config_TMDB:
    type: object
  models.DBSavedSet:
    properties:
      id:
        type: string
      selected_types:
        items:
          type: string
        type: array
      user_created:
        type: string
    type: object
  models.LibrarySection:
    properties:
      id:
        description: Unique identifier for the library section.
        type: string
      media_items:
        items:
          $ref: '#/definitions/models.MediaItem'
        type: array
      path:
        description: Path of the library section on the media server.
        type: string
      title:
        description: Title of the library section.
        type: string
      total_size:
        type: integer
      type:
        description: '"movie" or "show"'
        type: string
    type: object
  models.MediaItem:
    properties:
      added_at:
        description: Added timestamp
        type: integer
      collection_ids:
        description: IDs of collections this item belongs to
        items:
          type: string
        type: array
      content_rating:
        description: Used in MediaItem Details Page - For more information about the
          item
        type: string
      db_saved_sets:
        description: Used in MediaItem Details Page - For poster sets
        items:
          $ref: '#/definitions/models.DBSavedSet'
        type: array
      guids:
        description: Used in MediaItem Details Page - For ratings
        items:
          $ref: '#/definitions/models.MediaItemGuid'
        type: array
      has_mediux_sets:
        description: Used in Home Page - sorting and filtering
        type: boolean
      ignored_in_db:
        description: Whether the item is marked as ignored
        type: boolean
      ignored_mode:
        description: Mode of ignoring (e.g., "always", "temp")
        type: string
      library_title:
        description: Title of the library/section the item belongs to
        type: string
      movie:
        allOf:
        - $ref: '#/definitions/models.MediaItemMovie'
        description: Present if Type is "movie"; Contains file info
      rating_key:
        description: RatingKey is the internal ID from the media server
        type: string
      released_at:
        description: Release date timestamp
        type: integer
      series:
        allOf:
        - $ref: '#/definitions/models.MediaItemSeries'
        description: Present if Type is "show"; Contains seasons and episodes info
      summary:
        description: Summary or description of the media item
        type: string
      title:
        description: Title of the media item
        type: string
      tmdb_id:
        description: TMDB ID of the media item
        type: string
      type:
        description: '"movie" or "show"'
        type: string
      updated_at:
        description: Last updated timestamp
        type: integer
      year:
        description: Release year of the media item
        type: integer
    type: object
  models.MediaItemEpisode:
    properties:
      episode_number:
        type: integer
      file:
        $ref: '#/definitions/models.MediaItemFile'
      rating_key:
        type: string
      season_number:
        type: integer
      title:
        type: string
    type: object
  models.MediaItemFile:
    properties:
      duration:
        type: integer
      path:
        type: string
      size:
        type: integer
    type: object
  models.MediaItemGuid:
    properties:
      id:
        type: string
      provider:
        type: string
      rating:
        type: string
    type: object
  models.MediaItemMovie:
    properties:
      file:
        $ref: '#/definitions/models.MediaItemFile'
    type: object
  models.MediaItemSeason:
    properties:
      episodes:
        items:
          $ref: '#/definitions/models.MediaItemEpisode'
        type: array
      rating_key:
        type: string
      season_number:
        type: integer
      title:
        type: string
    type: object
  models.MediaItemSeries:
    properties:
      episode_count:
        type: integer
      location:
        type: string
      season_count:
        type: integer
      seasons:
        items:
          $ref: '#/definitions/models.MediaItemSeason'
        type: array
    type: object
  routes_config.AppConfigStatus:
    properties:
      config_loaded:
        description: Whether a config file is loaded
        type: boolean
      config_valid:
        description: Whether the loaded config is valid
        type: boolean
      current_setup:
        allOf:
        - $ref: '#/definitions/config.Config'
        description: The current (sanitized) configuration
      media_server_name:
        description: Friendly name of the media server
        type: string
      needs_setup:
        description: Whether the app needs initial setup
        type: boolean
    type: object
info:
  contact: {}
  title: Aura API
  version: "1.0"
paths:
  /api/config:
    get:
      description: Returns current config status and sanitized setup data
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_config.AppConfigStatus'
      summary: Get Config Status
      tags:
      - config
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
