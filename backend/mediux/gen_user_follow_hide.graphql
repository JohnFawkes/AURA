query getUserFollowHide {
	user_follows(filter: { follower_id: { id: { _eq: "$CURRENT_USER" } } }) {
		followee_id {
			id
			username
			avatar {
				id
			}
		}
	}
	user_hides(filter: { hider_id: { id: { _eq: "$CURRENT_USER" } } }) {
		hiding_id {
			id
			username
			avatar {
				id
			}
		}
	}
}
